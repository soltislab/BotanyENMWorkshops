name: Build Bookdown

on:
  push:
    branches: [MLG]
    paths:
      - "Botany2026/scripts/**"
      - "Botany2026/scripts/tools/**"
      - "book/**"

permissions:
  contents: write

jobs:
  build-book:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install packages
        shell: Rscript {0}
        run: |
          install.packages(c(
            "bookdown",
            "knitr",
            "rmarkdown",
            "stringr"
          ))

      - name: Convert scripts
        shell: Rscript {0}
        run: |
          source("Botany2026/scripts/tools/convert_to_rmd.R")

      - name: Build book
        shell: Rscript {0}
        run: |
          setwd("book")
          bookdown::render_book("index.Rmd")

      - name: Publish to bookdown branch
        run: |
          git fetch origin bookdown:bookdown || true

          git worktree add publish bookdown || \
            git worktree add -b bookdown publish
          rm -rf publish/*
          cp -R book/_book/* publish/

          cd publish
          touch .nojekyll

          git add .
          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit -m "Update book" || echo "Nothing to commit"
          git push origin bookdown
