name: Build Quarto Website

on:
  push:
    branches:
      - MLG

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install packages
        shell: Rscript {0}
        run: |
          install.packages(c("stringr"))

      - name: Install WebR
        run: |
          quarto add coatless/quarto-webr --no-prompt

      - name: Convert scripts
        shell: Rscript {0}
        run: |
          source("Botany2026/scripts/tools/convert_to_qmd.R")

      - name: Render website
        run: |
          quarto render website

      - name: Publish website branch
        run: |
          git fetch origin website || true

          git worktree add publish website || \
          git worktree add -b website publish

          rm -rf publish/*

          cp -R website/_site/* publish/

          cd publish

          touch .nojekyll

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "Update website" || echo "No changes"

          git push origin website
